name: Release

# Fires only after the CI workflow succeeds on main, so a red build never ships.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    # workflow_run also fires for failed/cancelled runs and for PR-triggered CI;
    # gate on a successful push-triggered run.
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags are needed to compute the next version
          ref: ${{ github.event.workflow_run.head_sha }} # release exactly the commit CI tested

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag -l 'v*' | sort -V | tail -n1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            IFS=. read -r major minor patch <<< "${latest#v}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Latest tag: ${latest:-none} -> next: $next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Build darwin binaries
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o claude-tower-darwin-arm64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o claude-tower-darwin-amd64

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            claude-tower-darwin-arm64 claude-tower-darwin-amd64
