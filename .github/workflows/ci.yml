name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Pure-logic packages (registry, transcript parsing) compile and test on
    # Linux; the macOS-only runtime bits (keychain, ps, cmux) aren't exercised
    # by the tests, so ubuntu keeps CI fast and free.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - run: go mod download

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - run: go vet ./...

      - run: go build ./...

      - run: go test -race ./...
